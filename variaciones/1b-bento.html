<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>La Esquina 24H — Menú (1b Bento / Grid)</title>

  <!-- Tipografías: Anton para títulos, Inter para el resto -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Variables de diseño compartidas -->
  <link rel="stylesheet" href="../css/styles.css">

  <style>
    /* ====== Layout de la variación 1b (Bento / Grid) ====== */

    body {
      display: flex;
      justify-content: center;
      background: #0a0a0a;
    }

    .app {
      width: 100%;
      max-width: var(--page-max-width);
      min-height: 100vh;
      background: var(--color-bg);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ---- Hero con imagen, logo y badge "Abierto" ---- */
    .hero {
      position: relative;
      height: 210px;
      flex-shrink: 0;
    }
    .hero__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .hero__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.55) 0%, rgba(18,18,18,.2) 55%, var(--color-bg) 100%);
      pointer-events: none;
    }
    .hero__brand {
      position: absolute;
      top: var(--space-lg);
      left: var(--space-lg);
      right: var(--space-lg);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .hero__logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--color-accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      color: var(--color-white);
      font-size: 17px;
    }
    .hero__name {
      font-family: var(--font-display);
      color: var(--color-white);
      font-size: 18px;
    }
    .hero__badge {
      position: absolute;
      top: 14px;
      right: var(--space-lg);
      background: var(--color-accent);
      color: var(--color-white);
      font-weight: 800;
      font-size: 9px;
      letter-spacing: .05em;
      padding: 5px 9px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .hero__caption {
      position: absolute;
      bottom: var(--space-lg);
      left: var(--space-lg);
      right: var(--space-lg);
    }
    .hero__promo-tag {
      display: inline-block;
      background: var(--color-accent);
      color: var(--color-white);
      font-weight: 800;
      font-size: 10px;
      letter-spacing: .05em;
      padding: 4px 9px;
      border-radius: 5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .hero__title {
      font-family: var(--font-display);
      color: var(--color-white);
      font-size: 22px;
      line-height: 1;
    }

    /* ---- Tabs tipo pill ---- */
    .tabs {
      display: flex;
      gap: var(--space-sm);
      padding: 14px var(--space-lg) 10px;
      overflow-x: auto;
      overflow-y: hidden; /* evita el scroll vertical fantasma del scrollbar horizontal */
    }
    .tab {
      background: var(--color-surface);
      color: #aaa;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 20px;
      white-space: nowrap;
      transition: background .15s ease, color .15s ease;
    }
    .tab.is-active {
      background: var(--color-accent);
      color: var(--color-white);
      font-weight: 800;
    }

    /* ---- Aviso de oferta ---- */
    .offer {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      margin: 2px var(--space-lg) var(--space-md);
      padding: 10px var(--space-md);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .offer__tag {
      background: var(--color-border);
      color: var(--color-accent);
      font-weight: 800;
      font-size: 9px;
      letter-spacing: .05em;
      padding: 3px 7px;
      border-radius: 4px;
      text-transform: uppercase;
      flex-shrink: 0;
      border: 1px solid var(--color-accent);
    }
    .offer__text {
      color: var(--color-text);
      font-size: 12px;
      font-weight: 600;
    }

    /* ---- Grid de productos (bento 2 columnas) ---- */
    .products {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 4px var(--space-lg) var(--space-lg);
      flex: 1;
    }
    .product {
      background: var(--color-bg-elevated);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .product__img {
      width: 100%;
      height: 96px;
      object-fit: cover;
    }
    .product__body {
      padding: 9px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .product__name {
      color: var(--color-text);
      font-weight: 700;
      font-size: 12.5px;
      line-height: 1.2;
    }
    .product__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .product__price {
      color: var(--color-accent);
      font-family: var(--font-display);
      font-size: 16px;
    }
    .product__add {
      width: 26px;
      height: 26px;
      border-radius: var(--radius-pill);
      background: var(--color-accent);
      color: var(--color-white);
      font-size: 16px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .products__empty {
      grid-column: 1 / -1;
      color: var(--color-text-muted);
      font-size: 13px;
      text-align: center;
      padding: 40px 0;
    }

    /* ---- Ubicación y horarios ---- */
    .location {
      padding: var(--space-md) var(--space-lg) var(--space-lg);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .location__title {
      font-family: var(--font-display);
      color: var(--color-text);
      font-size: 18px;
      line-height: 1;
    }
    .location__map {
      border-radius: 14px;
      overflow: hidden;
      height: 160px;
    }
    .location__map iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
    .location__details {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-md);
    }
    .location__address {
      color: var(--color-text-muted);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.4;
    }
    .location__hours {
      background: var(--color-surface);
      color: var(--color-text);
      font-size: 10.5px;
      font-weight: 700;
      padding: 5px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ---- Footer simple ---- */
    .footer {
      /* espacio inferior extra para librar los controles flotantes (FAB + switcher) */
      padding: var(--space-lg) var(--space-lg) 120px;
      border-top: 1px solid var(--color-border-soft);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: var(--space-xs);
    }
    .footer__name {
      font-family: var(--font-display);
      color: var(--color-text);
      font-size: 15px;
    }
    .footer__copy {
      color: var(--color-text-muted);
      font-size: 10px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="app">

    <!-- Switcher de variaciones (previsualización) -->
    <nav class="switcher" aria-label="Cambiar de variación de menú">
      <div class="switcher__band">
        <div class="switcher__bar">
          <a class="switcher__btn switcher__btn--home" href="../index.html">Inicio</a>
          <span class="switcher__sep" aria-hidden="true"></span>
          <a class="switcher__btn" href="1a-clasico.html">1a</a>
          <a class="switcher__btn is-active" href="1b-bento.html" aria-current="page">1b</a>
          <a class="switcher__btn" href="1c-urbano.html">1c</a>
        </div>
      </div>
    </nav>

    <!-- Hero con imagen, logo y badge "Abierto" -->
    <header class="hero">
      <img class="hero__img" src="https://placehold.co/440x210/1a1a1a/E63232?text=Promo" alt="Imagen de portada de la promoción de la semana: combo medianoche por 99 pesos">
      <div class="hero__overlay"></div>
      <div class="hero__brand">
        <div class="hero__logo">LE</div>
        <div class="hero__name">LA ESQUINA 24H</div>
      </div>
      <div class="hero__badge">● Abierto</div>
      <div class="hero__caption">
        <div class="hero__promo-tag">Promo de la semana</div>
        <div class="hero__title">COMBO MEDIANOCHE $99</div>
      </div>
    </header>

    <!-- Tabs de categorías (pill) -->
    <nav class="tabs scroll-sin-barra" id="tabs">
      <button class="tab is-active" data-category="comida-rapida">Comida Rápida</button>
      <button class="tab" data-category="desayunos">Desayunos</button>
      <button class="tab" data-category="almuerzos">Almuerzos</button>
      <button class="tab" data-category="promociones">Promociones</button>
    </nav>

    <!-- Aviso de oferta -->
    <div class="offer">
      <div class="offer__tag">Oferta</div>
      <div class="offer__text">2x1 en Hot Dogs, martes y jueves después de las 10pm</div>
    </div>

    <!-- Grid de productos (se rellena con JS) -->
    <main class="products" id="products"></main>

    <!-- Botón flotante de contacto por WhatsApp -->
    <div class="wa-fab">
      <div class="wa-fab__band">
        <a class="wa-fab__btn" href="#" aria-label="Contactar por WhatsApp">
          <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.71.306 1.263.489 1.694.625.712.227 1.36.195 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
          </svg>
        </a>
      </div>
    </div>

    <!-- Ubicación y horarios -->
    <section class="location" aria-label="Ubicación y horarios">
      <h2 class="location__title">Ubicación y horarios</h2>
      <!-- Reemplazar el src por el enlace real de Google Maps (Compartir → Insertar un mapa) -->
      <div class="location__map">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3980!2d-99.1332!3d19.4326!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTnCsDI1JzU3LjQiTiA5OcKwMDcnNTkuNSJX!5e0!3m2!1ses!2smx!4v1700000000000"
          title="Mapa de ubicación de La Esquina 24H"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
          allowfullscreen></iframe>
      </div>
      <div class="location__details">
        <div class="location__address">Av. Principal, [sector], [ciudad]</div>
        <span class="location__hours">Lun–Dom · 6:00pm – 4:00am</span>
      </div>
    </section>

    <!-- Footer simple -->
    <footer class="footer">
      <div class="footer__name">LA ESQUINA 24H</div>
      <div class="footer__copy">© 2026 La Esquina 24H — Todos los derechos reservados</div>
    </footer>

  </div>

  <!-- Datos del menú compartidos entre todas las variaciones -->
  <script src="../js/menu-data.js"></script>
  <script>
    // El array de productos vive en ../js/menu-data.js (window.MENU) y es
    // compartido por 1a, 1b y 1c. Aquí solo cambia el markup (tarjetas bento).
    const productsEl = document.getElementById('products');
    const tabsEl = document.getElementById('tabs');

    // Renderiza las tarjetas de producto de una categoría en grid
    function renderProducts(category) {
      const items = MENU[category] || [];
      if (items.length === 0) {
        productsEl.innerHTML = '<div class="products__empty">Próximamente…</div>';
        return;
      }
      productsEl.innerHTML = items.map(function (p) {
        return (
          '<article class="product">' +
            '<img class="product__img" src="' + p.img + '" alt="Foto del producto: ' + p.name + '">' +
            '<div class="product__body">' +
              '<div class="product__name">' + p.name + '</div>' +
              '<div class="product__row">' +
                '<div class="product__price">' + p.price + '</div>' +
                '<button class="product__add" aria-label="Agregar ' + p.name + '">+</button>' +
              '</div>' +
            '</div>' +
          '</article>'
        );
      }).join('');
    }

    // Cambio de categoría al hacer click en una tab
    tabsEl.addEventListener('click', function (e) {
      const tab = e.target.closest('.tab');
      if (!tab) return;
      tabsEl.querySelectorAll('.tab').forEach(function (t) {
        t.classList.remove('is-active');
      });
      tab.classList.add('is-active');
      renderProducts(tab.dataset.category);
    });

    // Estado inicial: Comida Rápida
    renderProducts('comida-rapida');
  </script>

  <!-- Aparición al hacer scroll + header sticky -->
  <script src="../js/main.js"></script>
</body>
</html>
